<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Omega — SKIF Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #06080c;
            --panel: #0c1018;
            --border: #1a2233;
            --accent: #00e5a0;
            --accent-dim: #00e5a033;
            --warn: #ff6b4a;
            --text: #e2e8f0;
            --text-dim: #64748b;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }
        
        /* Grid background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
        }
        
        /* Radial glow */
        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            border: 2px solid var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1.5rem;
            background: var(--panel);
        }
        
        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        
        h1 span { color: var(--accent); }
        
        .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }
        
        .classification {
            display: inline-block;
            background: var(--warn);
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        
        input[type="password"] {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 1.1rem;
            padding: 1rem 1.25rem;
            text-align: center;
            letter-spacing: 0.3em;
            outline: none;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-dim);
        }
        
        input[type="password"]::placeholder {
            color: var(--text-dim);
            letter-spacing: 0.15em;
            font-size: 0.8rem;
        }
        
        .error {
            color: var(--warn);
            font-size: 0.75rem;
            margin-top: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            letter-spacing: 0.1em;
        }
        
        .error.show { opacity: 1; }
        
        .access-info {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        
        .access-info .row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
        }
        
        .access-info .val { color: var(--accent); }
        
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⬡</div>
        <h1>Station <span>Omega</span></h1>
        <div class="subtitle">SKIF Access Control</div>
        <div class="classification">TS//SCI — AUTHORIZED PERSONNEL ONLY</div>
        
        <div class="input-group">
            <input type="password" id="passcode" placeholder="ENTER ACCESS CODE" autofocus autocomplete="off">
        </div>
        <div class="error" id="error">⛔ ACCESS DENIED — INCORRECT CODE</div>
        
        <div class="access-info">
            <div class="row"><span>Protocol</span><span class="val">AES-256</span></div>
            <div class="row"><span>Session TTL</span><span class="val">24 hours</span></div>
            <div class="row"><span>Facility</span><span class="val">MALTA</span></div>
        </div>
    </div>
    
    <div class="footer">STATION OMEGA — MEDITERRANEAN NODE — 35.87°N 14.51°E</div>
    
    <script src="auth.js"></script>
</body>
</html>
